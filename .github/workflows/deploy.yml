name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install, build, and upload
        uses: withastro/action@v6
        with:
          package-manager: pnpm@10.12.1
          build-cmd: pnpm run build
        env:
          PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
          PUBLIC_BOOKING_AVAILABILITY_PATH: ${{ vars.PUBLIC_BOOKING_AVAILABILITY_PATH }}
          PUBLIC_BOOKING_UPLOAD_PATH: ${{ vars.PUBLIC_BOOKING_UPLOAD_PATH }}
          PUBLIC_BOOKING_PREBOOK_PATH: ${{ vars.PUBLIC_BOOKING_PREBOOK_PATH }}
          PUBLIC_BOOKING_CONFIRM_PAYMENT_PATH: ${{ vars.PUBLIC_BOOKING_CONFIRM_PAYMENT_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
